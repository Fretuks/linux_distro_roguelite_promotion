quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:kernel_panic_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
quarkus.datasource.jdbc.max-size=4

auth.admin.username=admin
auth.admin.password=secret

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://kernel-panic.local/issuer
smallrye.jwt.sign.key.location=privateKey.pem
quarkus.smallrye-jwt.enabled=true
